body:
  text: 門人真朴編次奏對機緣九月十七日至天津天使入奏上命備車馬迎師二十二日午刻進萬善殿駕隨到召師進見傳諭免禮賜坐師云山林野逸特蒙寵召夙生何幸得睹天顏上慰勞畢乃問師年臘得法元由師詳敘始末復云老和尚最初開堂何處師云繼席天童上云同門昆季有幾何人師云十二位上云老和尚第幾師云忝居第八上復問同門名號師一一宣畢上問老和尚得法弟子幾人師云二十五人上問得法隨侍幾位師云六人上傳召隨侍進見逐一問名畢遂傳諭朕敦請老和尚遠來本為弘揚佛法況天氣嚴寒且結冬制俟春日還山何如師良久云遵旨即諭萬善愍忠廣濟三處結冬仍諭上堂日命諸禪者進萬善殿裏聽法次日辰時上攜學士王熙馮溥曹本榮狀元孫承恩徐元文至方丈賜坐上命學士問老和尚來自天童如何是天童得力句師云奉皇上詔書特特到此問如何是正法眼藏師豎拳云突出難辨又問如何是觀自在師鼓掌云還聞麼復問大學之道在明明德朱子云明明之也如何是明之底道理師云問取朱文公去士皆無語上發笑上問老和尚幾歲上參見天童先和尚師云三十一歲上云初參何人師云打初行腳曾見黃檗無念和尚上云無念和尚誰之法嗣師云念師於七尖峰大休和尚言句下起疑得悟實未見休也上云是甚言句師云僧問如何是祖師西來意休云黃瓜茄子上云老和尚因甚機緣悟道師云長疑産難因緣後來有箇會處學士云大慧也從此打失布袋者公案畢竟作麼生師云明破即不堪又問女子出定公案請老和尚下一轉語師云任從滄海變終不為君通士云婆子請趙州轉藏經只轉得半藏那半藏作麼生轉師云學士起身禮拜皇上著又問發心參禪即是善如何又說不思善不思惡既善惡都不思當何處著力師云善惡總從心生心若不生善惡何著士沈吟師震威一喝上云才涉思惟總成意識邊事師云大哉王言上問如何是悟後底事師云待皇上悟後即知學士進云悟即不問師云問即不悟上首肯上問有禪師教人參念佛底是誰作麼生參師云畢竟念佛底是誰但恁麼看上提起案頭數珠云和尚喚者箇作甚麼師云請陛下放下著上放下數珠師云是甚麼上問參禪悟後人還有喜怒哀樂也無師云逆之則怒順之則歡上欣然復云大都此事甚難師云也不難不見龐公云難難十石油麻樹上攤龐婆云易易百草頭上祖師意靈照云也不難也不易饑來喫飯困來睡上云卻是靈照超過龐公師云非父不生其子上問壽昌無明和尚雲門湛然和尚曾參見何人果是真實悟道善知識麼師云二老悟不由師特印心於曹洞宗人而知真行卓無可遺議者即舉壽昌偈云冒雨衝風去披星帶月歸不知身是苦唯慮行門虧至若湛師則雲流天空事過即忘尤稱無心道人上嘉羡不已復諭學士不須更問公案但請老和尚開示做工夫士問做工夫只是多間斷師云間斷不間斷不要管若是怕間斷即加一番隔礙但遇事來即應事後即單提正念如王臨宇秉靈鋒寶劍凜凜神威一切魔外誰敢近傍做工夫須是恁麼始得士問做工夫還是看甚麼話頭師云話頭之說無有定法但是去不得處便是話頭古人於後學初機無處著力不得已教他看一無意味話如萬法歸一一歸何處之類著令咬嚼不破橫不得豎不得如一座鐵壁銀山頓在面前孜孜沒沒廢寢忘餐有朝一日撞透銀山鐵壁方是得力處士云如何得到廢寢忘餐底田地師云廢寢忘餐非是勉強如學士有一急切事在心不知不覺廢寢忘餐蓋欲罷自不能耳又問世情濃厚如何得輕去師云道念若重則世念自輕譬如稱物一般頭重則尾輕頭輕則尾重矣上笑云朕向亦曾如此過來用心真切則世緣不覺自輕士云我輩措大家多學文字未免涉理障恐難悟入師云即文字亦須有箇悟頭方始超卓如東坡是五祖戒後身故下筆清空靈妙但轉過頭來卻於己事生疏然亦暫時岐路因舉溈山與寒拾相見機緣拾云休休他三生曾做國王來一總忘卻了也古人多有隔陰之迷唯皇上果位中人雖現身為生民主而念念不忘此事誠過古人遠矣上問有箇雪嶠和尚聞渠真率不事事末後示寂甚超脫老和尚可知其人及曾親近否師云先法叔住開先時曾受西堂之職及示寂雲門遺命主其後事乃述雪老人于丁亥年八月十九日示微疾次日封鐘版親書一紙示衆云小兒曹生死路上須逍遙皎月冰霜曉喫杯茶坐脫去了至二十六日酉時果索茶飲口唱雪華飛之句奄然坐逝然近代如林皋和尚之升堂告衆若菴和尚之預定逝期其事詳載塔銘皆忞所撰則又不止一雪嶠老人也上云學道須是恁麼方好師云此中亦有淆訛如真點胸乃一代大知識臨示寂展轉痛苦侍者云和尚終日訶佛罵祖而今卻恁般漏逗真云你作者般見解遂起身趺坐而逝古來尊宿如此不一儘有人不識修行不聞佛法也能預知時至無疾而終所以此事貴在眼明眼若不明即坐脫立亡未足多也上問先天童和尚示滅如何師云示現微疾臨期按行工築歸方丈吉祥而逝上問有箇熊開元曾見老和尚否師云曾見上云渠出家參禪有悟處麼師云覺得胸次未能灑然但人品極是高卓數為靈嵒分衛供衆上問靈嵒何人師云法姪弘儲漢月藏和尚之嗣是日自辰至午坐談十餘刻方始回宮十月十五日敘談餘事別記十月二十八日敘談餘事別記十月二十九日敘談餘事別記臘月十五日敘談餘事別記庚子年正月初二日敘談餘事別記正月初三日敘談餘事別記正月十一日敘談餘事別記三月十五日駕至方丈上云者幾日在宮中多看語録見有上堂晚參小參示衆之不同何也師云先德叢林凡遇為國開堂及至節元旦皆升座拈香祝聖其餘三八朔望垂示俱名上堂所謂晚參者古來學者朝參暮請善知識亦為之暮而升堂即上堂之異名也小參者所謂家教是也與示衆均名隨宜開導雖立名不同要皆時時刻刻以此事提撕學者耳上乃命學士王熙問有句無句如藤倚樹意旨如何師云有句無句且置樹倒藤枯畢竟何歸何處士云求老和尚分明開導師云事不如此欲求老僧分明開導即誤賺居士了也上隨問向上一路千聖不傳如何是不傳底事師良久問上云陛下會麼上云不會師云只者不會底是箇甚麼是何境界作何體段皇上但恁麼翻覆自看看來看去忽若桶子底脫自然了辦上云求老和尚更下一語看師云無毛鐵鷂過新羅上又問如何做工夫始得與此事相應䒢溪進云皇上當謝絶諸緣閉門靜坐饑來喫飯困來打眠如大死人相似始得師云此語在我禪和家即得皇上日應萬幾若一日稍不勵精則諸務叢脞矣上云畢竟如何用心即得師云先德有言但能於心無事于事無心則虛而靈寂而妙皇上但遇大小事務不妨隨時支應事後返觀向來酬應底畢竟從甚麼處起從甚麼處滅刻刻提撕念念不舍自然打成一片事事無礙上云恐有間斷時如何師云參禪無別訣只要生死切皇上果生死切時如孝子器卻父母即欲不哀痛不可得也上云生死心切誠如老和尚所說但見聞覺知昔人所訶今欲用心參禪未免落他見聞覺知師云譬如大火聚觸之即燎人然道火何曾燒卻口不見古人道即此見聞非見聞無餘聲色可呈君箇中若了全無事體用何妨分不分上云參禪悟道後還入輪回麼師云唯悟明生死底人正可入他輪回譬如皇上尊居黃閣忞與群臣何由得望恩光皇上唯屈尊就卑故忞等乃得共天語聞法要所以八地菩薩當證真之後如夢斯覺上無佛道可成下無衆生可度即欲入般涅槃十方諸佛同聲勸請善男子爾雖證此法門然而衆生沒在諸苦我諸佛等不以證此便為究竟不妨示如幻之法門覺如夢之衆生從此起大功行較前所修日劫相倍焉上復問老莊悟處與佛祖為同為別師云此中大有淆訛佛祖明心見性老莊所說未免心外有法所以古人判他為無因濫同外道上云孔孟之學又且如何師云中庸說心性而歸之天命與老莊所見大段皆同然佛祖隨機示現或為外道或為天人遠公有言諸王君子不知為誰如陛下身為帝王乾乾留心此道即不可以帝王定陛下品位也非但帝王即如來示現成佛亦是脫珍御服著敝垢衣佛亦不住佛位也上歡然首肯師云忞望七之年耳目昏重不便常侍天顏兼之近有執侍僧從天童來言山中大衆望忞不回俱有散去之意恐叢林荒廢乞皇上速賜還山上云趨風日久得承謦咳何忍遽令老和尚別去語畢潸然師云忞受天恩兼之皇情眷注亦何忍遠離但前所奏請皆萬不得已上云老和尚到處利生京師禪道佛法寂然無聞者百有餘年須得老和尚久久闡揚始有向往之者老和尚即不久留亦須三年師云忞道德涼儉曷能副上盛心皇上以佛心天子徵書四出詔求四海知識此風遍聞天下億兆蒼生莫不知有參禪學道之事皇上已為他下了般若種子即不能當下行持譬如丈夫食少金剛要當穿皮而出況般若正因乎上云朕亦不敢強留違老和尚意畢竟寬住幾時得以時時請益可也是日自午至酉方始回宮三月十六日敘談餘事別記三月二十三日敘談餘事別記三月二十四日敘談餘事別記四月初一日巳時上攜兩學士至方丈命學士王熙問如何是三界唯心萬法唯識師云一字兩頭垂上問三教歸一一歸何處師云大家在者裏學士復問善知識既是佛祖兒孫因甚卻要殺佛殺祖師云有了你沒了我有了我沒了你上以手指點云中庸道天命之謂性作麼生是性師云不離皇上舉手處復問僧問雪峰古澗寒泉話與趙州所答為同為別師云二俱作家二俱瞎漢師因進云忞時常出醜上前今日拈則公案亦請皇上下語乃舉婆子燒菴因緣畢遂云設抱定皇上云正恁麼時如何作麼生下一語免得婆子趁出燒卻菴上云朕從來不曾留心焉敢在老和尚面前指東道西師云乞皇上畢竟下一語上又推辭師云皇上既下不得決須發起勇猛心著實參究究到無可究處忽然㘞地一聲自然七通八達得大自在時上極為稱善復敘餘事及暮回宮漏下三鼓尤命內臣傳語抄録婆子機緣入宮詳加體究四月初六日敘談餘事別記四月二十三日敘談餘事別記四月二十九日敘談餘事別記五月初七日敘談餘事別記五月初八日敘談餘事別記五月初九日從晨抵暮二次至方丈敘談餘事別記五月十三日從晨抵暮二次至方丈敘談餘事別記五月十四日從晨抵暮二次至方丈敘談餘事別記上一日問南泉斬貓意旨如何師云直逼生蛇立化龍上云趙州當日頂草鞋出去南泉許為救得貓兒若問老和尚合作麼生下語師云老凍儂為他閒事長無明作麼上一日手書大學之道在明明德拈起示師曰請老和尚下一轉語師云日輪正卓午上一日問梁武帝見達磨問如何是聖諦第一義磨云廓然無聖意旨如何師云綿包特石上云帝曰對朕者誰磨云不識又作磨生師云鐵裏泥團上云今問老和尚如何是聖諦第一義師云天無二日民無二王上云對朕者誰聻師云即日恭惟皇上聖躬萬福上一日展視雪嶠老人真其自贊有云者漢奇怪隨云請老和尚下語師云賣弄不少上一日慨歎場屋中士子多有學寡而成名才高而淹抑者如新狀元徐元文業師尤侗極善作文字僅以鄉貢選推官在九王攝政時復為按臣參黜豈非時命大謬之故耶師云忞聞之君相能造命士之有才患皇上不知耳上既知矣何難擢之高位上曰亦有此念因命侍臣取其文集來內有臨去秋波那一轉時藝上與師讀至篇末云更請諸公下一轉語看上忽掩卷曰請老和尚下師云不是山僧境界時升首座在席上曰天岸何如升曰不風流處也風流上為大笑
