body:
  text: 門人真樸編次偈見聖謠三章曾聞護國頌仁王何幸勉勉見我皇論道至忘天子貴平拈公案細商量嚴陵加足不稱臣光武包荒為故人喝下疏僧承顧笑千秋法社詠皇仁豁達雅方漢祖雄御人以禮法堯躬鉤章擬欲歌明德浩浩如天歎莫窮上問孔顏樂處荅云一箇閒人天地間因成四韻孔顏樂處意何長自得吾真萬慮忘一箇閒身天地內半瓢風月枕肱旁階前秋艸橫千古眉底青眸貫百王春雨乍滋霜又落笑看人世電飛光上賜御畫山水圖有序己亥閏三月上傳敕天童召忞赴京命即萬善殿安禪結制上不時出宮就見忘其位貌待若賓朋間於論道之餘抵掌而譚天下之事則靡不周知曲盡一日出數軸示忞曰此朕數年前遣病時作也遂以山水一蒲桃一賜忞焉墨光澹蕩筆意瀟疏殆騷人韻士揣摩半生而未臻其閫者上獨優為之昔班固作漢書稱昭帝十四能知上官桀之詐今上十四總攬乾綱肅清海甸不假霍光之輔一皆出自宸斷尚以萬幾餘暇博綜帝典王謨旁及百氏家言既承精一之傳復探西來大意至若詩文小技筆墨餘長猶善且美若此竊謂中古帝王未有聰明睿智如今上者也忞艸莽餘生得奉天顏已屬厚幸乃皇皇手澤輒以見遺他日持歸藏之太白名山顧不成禪叢千秋佳話哉敬拜手颺言為識其歲月云爾一幅吳綾御墨鮮半含秋水半春煙崩騰瀑布疑匡阜澹遠村墟似輞川寵賚固非龍惱缽手遺全勝始豐田名山歸奉天龍護佳話應知百祀傳上語及先師每廑生不同時之歎因出處士曾鯨所繪道影喜動龍顏遂命供奉王國彩臨摹二幅備極莊嚴賜藏天童其原本留宮供養異世奚殷聖主虔道兮師大德師全空生寫就趺巖石瑞相摹成下二天彷聽雷音宣寶座儼驚法雨灑當前通身兩處分朝野不盡真燈耀帝乾上詢先師語錄因偕直說進呈御覽徹宵豁然神契即日依忞疏請賜同大藏流通微言師亦遠睿智獨明真既發終宵歎旋教曠典新琅函光吐月玉軸曉生春大義昭星日昏衢息夜燐上詰天童何義為述其由兼請寺額上下弘法圓照真覺法慶諸顏俾忞自定乃遵首二字焉名山希寵錫聖主尚勞謙兩字從高揭諸顏聽自拈瑤章侵玉漢天樂動危檐太白標弘法名同實共兼上問祖山初見何人云天童先老和尚上忽動容因問有何機緣云以功夫不切實為叩蒙賜痛棒云有甚麼不切實上曰適生晚暮恨不及見此老耳忞曰四海五湖皇化裏先師亦安能出得陛下大威光也上曰得三五年有箇會處當自見渠忞曰誠如天言皇封彌浩浩函蓋廣于天當宁來何暮先師往豈前瞥而親薦得一會自儼然今古無畦岸天言信不愆上所居師蕘堂門書生死事大壁書莫道老來方學道孤墳盡是少年人之句為語忞曰每對此輒萬緣寢削因進曰少年讀李卓吾纔等待便千萬億劫了也即日出家上曰亦請老和尚大書用以自警君王方鼎盛怛化切斯須緣以大人覺益之良士瞿情封千界落心月一輪孤不住無生地蓬瀛詎所圖上命供奉王國彩重摹幻質留供闕庭適駕臨方丈御覽一過為添數筆遂覺生肖宛然馘黃項槁貌支離任是僧繇巧聚眉底費九重親手澤為留七眾好風規三毛幸已仍加頰四面何勞更顯奇堪笑古錐成骨董萬年凌閣永傳持上念忞將別去後會難期自簡宣紙數十幅命作大小行楷留宮上亦劈窠書敬佛四大字賜忞謂彼此展視有同面晤云惜別君王重多愁會晤難何由能縮地長此共盤桓託意存千古留思寄卷端正虞風雨夕未易等閒看上于乾清宮所祀關壯繆親示良工雕刻黃金鎧甲寶玉爛然蓋經三年而始就者因忞歸太白賜作山門護法帝重關夫子肖形百寶裝海山憐去轍歸護敕維匡漢主猶堪託髡徒豈足襄名藍標太白千載倚金湯上于庚子孟春爰下罪己之言一切修禳諸事敕俱停止特于四月八日嚴修水陸道場九晝夜以忞生遐陬未之或見也慚受天恩渥驚聞佛事開在資心意廣不惜大官財僊梵凌空際天真降九垓為僧今半百恍誤蹋瑤臺上于四月二十七日命遊南苑觀新建德壽寺敕近臣就玄靈宮寢殿設齋管待極其隆渥南苑策遊騎駿奔走侍臣宮庭排盛燕山海列名珍飽德誠無盡酬章媿莫陳願歌天保詠回祝向丹宸上再擇夏五既望聽忞徂征尤不忍遽離如是促席晤譚于風晨雨夕者旬有餘日無倦怠之意焉征帆驚遂挂離思浩無涯風雨晨兼夕乘與遣復排寧云忘勢位直己外形骸我后誠高朗微躬若措懷上亟稱內臣張斐然與供奉虞世瓔一學顏歐一學鍾王皆妙得其家風因拈案頭敕書展視曰此張斐然筆也遂命天岸昇子朗誦其文至忞法名上曰不當犯諱但為國體所屈忞曰君臣之分無所逃也上曰心殊不安幻質同殊劣虛名等聖凡馬牛呼不惜君國體何巉盛世尊耆德天王式艸嵒山林叨履戴寧越蓋與函上敕門人本昇久居山東開發四眾仍賜所居大覺院為法慶寺命侍臣出帑金五百兩俾歸住持勗以勉之祖風揚北海帝敕在而躬炳煥奎章揭霈滂德施隆大迻齊魯俗深鑿智愚瞳勿謂欽承小厥聲天語哅上留門人本月本皙在京開法為存法思之念也臨行規訓二子宸慮何覃厚風雲藉爾征因憐舐犢意遂展及烏情奮志酬先德殫躬報聖明毋為耽晏逸鎩羽負生平上問忞幾時再來晤朕忞云待皇上三十或狗馬未填溝壑當來敬致封祝上云老和尚定與趙州齊年忞云審如慈旨尚得恭慶我皇八十也時學士曹本榮在側進曰皇上固然萬壽無疆我師亦合寶掌千齡忞曰果爾則忞當百度來京矣上為大笑逝水嗟難復朝宗詎所艱趙州如可匹寶掌不須扳六度登黃閣千回覲聖顏坐添長壽考金口自宣頒上于十五日淩晨單騎御萬善門敕忞乘馬並轡而行親送百餘步已回輦矣復馳至北苑門握手而別艸莽臣何德皇情眷若琛分攜重握手回榮復言心愁豈關山遠悲因媿感深生平珠玉淚一瀉百壺斟贈普慈印心二天使宸衷嗜道邁前王奉御每監內道場不為聖神求法匠勞勞誰問越山長對御譚禪妙有鋒語當箭拄卻從容恩波湛湛沐偏厚常在君王顧鑒中贈靜香周觀察諱荃鮮烹大國藝通神小技詩文畫可人休怪毘耶能慧巧大千手擲若陶輪過淮河弔金龍四大王丹心只擬挽天河洗淨乾坤穢濁多靈爽千秋殊未化肯憑險惡作風波贈別山普應禪師金錫半生縣帝闕師名兩度受皇恩祇將鼻孔聞聲息日轉真經百億番贈祖山地姪禪師傳得金車無底缽編蒲仍打睦州鞋那堪錫寄黃金闕溫清依然日挂懷贈憨璞聰孫明覺禪師延平劍氣干牛斗況更磨礱在帝旁殺活從伊顛倒用當鋒不犯一豪芒贈玄水杲孫禪師禹門浪裏擎頭角衝破長天萬里風騰蹋試行師子步無端弄入帝王宮東來堂霓菴公王于朝罷時間從問道終日無倦容短章以贈嘉其好善忘勢敏而嗜學有賢士之風無貴人之習焉帝子寵來必肆奢翩翩誰得似君嘉菲躬動若同寒素超俗思將類島霞學富淮南匪假託藝方松雪自名家幾回臨漪亭邊過忘卻西窗日又斜贈慶雲李欽差三朝歷事股肱臣鵷鷺班常近紫宸夙福信由多劫種報來麟趾更振振贈範宇張欽差少壯從龍佐闢疆忠勤事事得君王法門護念猶無倦囑受靈山信不忘贈春雨雷欽差殷憂王事知忠愛清白傳家驗後昌桂馥蘭馨方楚楚三槐應蚤植君堂贈鄰襄沈居士焚香阿閣日垂簾三藏承恩許貫淹塵內有經親剖出何須破句讀楞嚴贈湘南徐居士長侍君王賜澡修聞思放赦罕餘留從參活潑玲瓏句不看諸方死話頭贈普濟上人當年博施病陶唐普濟何緣眾口揚久隱西山稱逸士今開藥室號醫王補虛只用參苓散導滯還加蔻朴湯起死應知有活法一回汗出自清涼為成茂成幹李大君少君製字孟祥仲謀賦贈人言將相都無種我愛孟祥有父風飛鳥固然今已盡良弓留待射天熊鳳生鸑鷟虎生彪生子如君一仲謀記取他年麟閣上絳侯題後亞夫侯讀皞如曹居士申酉丙戌奏啟賦感劻勷謾說奉丹宸百六災思在甲申九廟明禋誠已矣二陵歸寢待誰陳義憐埋主毀家士忠憶藏肝剖脅臣殘局留君還了卻不妨長道未亡人題血書華嚴經有序海虞行虛禪人瀝血書雜華大典用藏四大名山茲部首先卒業因匍匐來京擬上清涼安置金剛堀內丐余題跋由是合十指爪宣說伽陀敬書于左真法供須身命酬紅蓮舌剖太經流法門無盡毛端揭海墨難書一滴收金色吐吞華藏晝紫豪掩映百城秋懷來五頂三千里珍重天龍護似眸題白團扇宛如秋月影團團動著清風透體寒八萬毛頭開孔竅雪庭誰更覓心安題別山普應禪師所畫白菜何意呈身在玉堂淩秋幾度傲冰霜自憐碧藻堪同潔未肯時饈遠遜香澹泊能明君子志麤疏不入貴人腸平懷一種天然趣細嚼方知道味長次韻留別春平吳上谷著手胸頭便了知前身金粟更何疑心空膴仕休官日智決烏臺選佛時勞侶不妨俾給侍尼乾且喚是吾師風流乞遍歌姬院下士從教謗復嗤無家客欲擬何歸為有林泉得便依山采蕨炊纓絡粥池栽荷補水田衣頑心友石秋同冷野杖聯雲曉共飛篆縷消來清晝永更驅萬象話玄微奉旨還山留別別山普應禪師再四陛辭俞復留吐殘榴火上官舟不堪回首君恩重難割永懷道誼綢歸意盛長方似夏離情黲黮蚤如秋願言保愛珍明德日對堯眉踰趙州越鳥翩翩向故山歸飛獨恨暌宸顏固慚八載葵傾日尚羨嚴城晝揜關多嗜利名叢物議誰膺寵錫等雲閒回天不藉揮戈力法社殷憂未可刪禮辭寶祖塔留別守塔潭湘禪人南望故山北望祠心縣祖寢更凄其園陵幸藉長居守墓木猶煩力護持縱直艱虞須保愛莫因枯淡便依違秋霜乍降蘆華白鴈足音書好寄知登舟南邁有感而作從別九閽後傷心已百端憫茲弱者肉猒彼虎而冠聖主憂民切黔黎見德難為詢金紫客因孰國委官舟至臨清十月不雨矣水涸塗見長年束手無策時護送天使欲遂棄舟余示以九重德意關帝威靈果而河水驟滿抵東昌大雨由是獲濟大川稱利涉水涸櫂為亭卒地潮生浦俄然漢起霆雨沾天子澤威顯帝君靈萬國通輸運皇心亦載寧過分水龍王廟讀永樂朝開河宋尚書禮公碑碣大禹功成後嘉君著令猷力排南旺水分接萬川流裕國非當世福民歷萬秋往來簫鼓客請一問祠頭贊血書曼殊大士贊非心非色謾疑猜權號文殊妙辯才襯足紅蓮隨地涌印空寶座自天開狻猊聲吼千魔怖智劍芒寒萬聖摧透體紫霞光飲日儼從金色界中來普賢大士贊萬行分披願海重象王行處疾驅風身雲彌布難思界毛孔中含一太空智似文殊稍共轍慧如普眼謾舒瞳百城參見吾師後春盡落華滿地紅達磨大士贊二首鳳凰臺上遭攙出少室嵒前受毒深行道不辭獰惡世為人徹底祖師心面皮鐵作石為肝九載憨憨著壁觀究竟心原無可覓何曾有法為人安紫柏尊者達觀可禪師贊秉慧劍操智橦金剛燄般若鋒開覺路復禪叢流藏典惠顓蒙精貫日氣吞虹佛幢震魔膽㤝道大難容堪忍世千秋法社想英風敕賜天童密雲悟和尚真奉旨題贊有序己亥菊月忞被召至京師留住內萬善殿上一日備問先師勤至乃出處士曾鯨所畫頂相進呈上自展觀命學士王熙讀先師自題贊及忞制贊動容久之然後詔近臣收進內宮臨摹一日語忞曰先和尚道影傳寫極工所題贊果是真筆否忞曰的係先師七十五歲時書也上曰朕已命工臨下二幅忞因進曰如原寫當聖意可留存大內願賜忞摹本還山俾先師叨皇恩光被當不朽耳至十月之晦依原本臨摹者裝潢始就其一幅則沈香龍座備極莊嚴于元正三日畢工上皆親送至萬善方丈展挂示忞并召忞門弟子俱來隨喜于時皇情極為歡說指所畫衣褶曰此皆朕手自著墨也復一日展示學士王熙曹本榮因謂忞曰即請老和尚題贊于上忞曰謹遵慈旨於乎先師自壬午入滅迨今十有八年尤能道契人主致人主景懷若此使與上生同一時對揚休命其遇合之隆又不知當何如者雖然先師之道誠大矣德誠備矣而今上嗜道好德之心亦萬世而旦暮遇之也昔神廟手書金剛經為汗所漬思欲易之詔問達觀可師可曰御汗一滴萬世津梁竊謂此段因緣為法津梁光于有昔故特表而出之以示後之來者大法身縣只一絲拔山有力等閒持鋒亡佛祖提綱日舌結天魔妙辯時毛孔散為千聖眼道標留作帝王師從茲太白歸藏後殃累兒孫曷盡期敕賜別山慧善普應禪師真贊百城罷訪入煙蘿宗說滔滔似決河缽洗禁池傾白月經翻古洞涌金波飲人以德同慈嫗荷法唯公絕比阿道影師名重疊賜袈裟沐盡御香多慶雲李公畫相贊諸艱歷試倍流離壯志如山屹不迻恭謹真堪追萬石勛名未肯亞驃騎曾無肺腑藏私怨只有丹誠報主知衣錦還歸行晝裏長安共說好男兒春雨雷金吾畫相贊丰神奕奕貌桓桓氣自干霄劍自寒閒跨征鞍平樂浪笑淩夜雪獵三韓亞夫勛業能嗣武太尉家聲正未闌最喜昔人長健羨金吾仍作父時官
