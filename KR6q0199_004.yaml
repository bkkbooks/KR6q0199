body:
  text: 門人真樸編次奏對別記下上一日問師先老和尚與雪嶠大師書法二老孰優師曰先師學力既到而天分不如雪大師天資極高而學力稍欠故雪師少結搆而先師乏生動互有短長也記得先師常語忞曰老僧半生務作運箇生硬手腕東塗西抹有甚好字虧我膽大耳上曰此正先老和尚之所以善書也揮豪時若不膽大則心手不能相忘到底欠于圓活上復問老和尚楷書曾學甚麼帖來師曰道忞初學黃庭不就繼學遺教經後來又臨夫子廟堂碑一上由不能專心致志故無成字在胸往往下筆即點畫走竄也上曰朕亦臨此二帖怎麼到得老和尚田地師曰皇上天縱之聖自然不學而能第忞輩未獲睹龍蛇勢耳上曰老和尚處有大筆與紙麼師曰紙即皇上敕忞書手卷底尚有十餘張但新制鬃豪恐不堪上用上乃命侍臣研墨即席濡豪擘窠書一敬字復起立連書數幅持一示師曰此幅何如師曰此幅最佳乞賜道忞上連道不堪師就上手撤得曰恭謝天恩上笑曰朕字何足尚崇禎帝字乃佳耳命侍臣一并將來約有八九十幅上一一親展視師時覺上容慘戚默然不語師觀畢上乃涕洟曰如此明君身嬰巨禍使人不覺酸楚耳又言近修明史朕敕群工不得妄議崇禎帝又命閣臣金之俊撰碑文一通豎于隧道使天下後世知明代亡國罪由臣工而崇禎帝非失道之君也師曰先帝何修得我皇為異世知己哉上一日語師聞江南下戶之家生子則育生女即淹殺是何道理師曰為貧故恐他日養成及笄難辦嫁資耳上曰豺虎性極殘忍饑不食子為人父母奈何使其出世一番不見天日而速赴黃泉哉即貧無嫁資于問名納采之日不受其聘禮則嫁時無妝奩亦怪我不得朕極痛恨此事已傳敕民間如有此等父母議罪乃出經筵日記中諸臣贊美之文與師誦之師曰皇上保民纖悉如此不特嬰孩受賜三十年後九土萬方無復更有曠夫生齒日繁既庶且教黃虞將不難再見于今矣上一日命侍臣持新傳大覺禪師真示師師曰即道忞未晤玉兄然觀此道容亦尊嚴可敬但頭戴青帽覺從上佛祖無此體制上曰何如師曰五篇七聚之中有一百眾學法凡禮佛誦戒入聚落進王宮不得覆頭犯者突吉羅上曰報恩和尚日常戴帽畫工炤樣寫出不便喚渠卸卻也䒢溪進曰本師歸山後聽諸禪夏不戴帽矣上曰報恩規矩何緣頓改師曰玉兄面稟儀刑親聞聖訓豈更死守善道上乃述大覺應詔始末因緣且言當日在山即堅臥不起極是高尚到了天津卻欲餓死不來如人家請客相似客到門了不肯入教那東家體面何在朕是直人便艸箇札子數他一上故論佛法朕當拜他若朕去歲教詔一番報恩和尚又當拜朕師曰玉兄此番舉止亦無他念緣生性不耐見士大夫一旦蒙詔誠慮赫赫天威難于瞻對不知我皇佛心天子不向四威儀中簡點僧家與別箇帝王迥異上曰從古帝王信向與否雖有不同然僧家長短斷然不問凡尋僧家底事皆是臣子做底勾當故老和尚不要怕朕指曹王二學士曰須怕他兩箇二人俯伏長笑上一日命內臣張問達寫師道容裝潢既就展示曹王二學士上為諦審再三乃曰覺得丰神奕奕有生動之意二臣歎羨不已師因進曰道忞山野陋質何當玉琢金相得傳寫御容一軸歸奉山林使臣民未睹天顏者得識龍光斯為千秋盛事上曰昨在宮諸臣亦奏請寫朕容朕諭之曰世有遠而可傳者唯功與德自朕踐祚十有七年今邊烽未息四海瘡痍未起朕無德而功不逮生民如此乃寫形傳世徒貽臣民羞故不欲也師曰皇上謙光太甚忞昔僻處遐陬己飫聞齊民頌皇上聖明矣心竊自疑意皇上生徼外入中華又極幼沖雖聖明天縱然虞夏商周之治詩書六藝之文未易悉也今得奉天顏八閱月親見皇上虛懷嗜學好問好察如此使生三代何難與禹湯並駕惜不幸而生斯世主斯民耳士問其故師曰世界增減互為循環釋迦丁減劫出衰周早已有亡國弒君不保其社稷者矣今去衰周將三千年民性日遷如江河之就下惡業相煽器亂臶臻皆其自作自受所以獻闖奮臂一呼天下土崩瓦解向非我皇出而御宇則生民大有首領之虞然則我皇功德豈不天壤同流哉上與學士由是釋然師聞上龍性難嬰不時鞭扑左右因上叩擊機緣後復啟曰參禪學道底人于逆順兩境亦須全身坐斷不可任情喜怒所以傅大士有言心性雖空貪瞋體實即普賢菩薩亦云我未見一法有大過患如瞋者故曰一念瞋心起百萬障門開者此也上曰朕遇境逢緣多不能覺炤然過後冰消決不記懷那箇師曰忞素知皇上長空皓月不遷不貳但我皇喜怒與別箇不同恆言有之天子一怒伏尸萬里待過後不記早已遲了上乃點首曰知道了後近侍李國柱語師如今萬歲爺非但不打人即罵亦希逢矣又萬歲爺極贊老和尚言胸懷平坦亦最慈和樂易云云上一日與師廣譚古今詞賦謂詞如楚騷賦如司馬相如皆所謂開天闢地之文至若宋臣蘇軾前後赤壁賦則又獨出機杼別成一調尤為精妙老和尚看者兩篇前後孰優師曰時人多謂前賦自其變者觀之下不合說道理不如後賦命意更覺渾然無跡據道忞看來蘇軾自以才高忤世不得于君謫遷散地遠竄江湖一切牢騷不平之氣付諸水月夢幻之觀前來江山難再風月無窮即後來涉險歸休萬緣一夢非前篇之遊神道妙無由知後篇之寓意深長前賦即後賦難置優劣其間也上曰老和尚論得極當乃通誦前賦一篇問師曰念得不錯麼師曰不錯上復言晉朝無文字唯陶潛歸去來辭獨佳亦為師誦之又誦離騷至中間覺齟齬乃曰久不經理竟忘前失後矣復言明臣文章事業不減唐宋朕極喜王守仁瘞旅文洎申時行袪倦文老和尚曾看過麼師答未曾上命侍臣取來與師共讀時日已入酉矣師曰道忞老眼昏華跟隨我皇不上上乃同師立簷前讀竟復入就坐少頃上忽作惡就外歐吐還語師曰朕邇來脾氣不佳適行者然燭觸硫黃氣故歐耳師斥行者上曰老和尚不要責他他那裏知得朕脾胃有病也師曰聖躬太勞乞回宮安息上曰適纔老和尚話尤未了師為敘訖上乃回宮上一日語師宮中有明朝成祖所集之書名曰永樂大典者以一殿貯藏無慮數百萬卷師曰皇上可曾看過麼上曰朕曾聊展一二冊若欲看過恐皓首窮年莫竟其籍也師曰年代深遠繙閱為難得不傷於蠹魚上曰收藏謹固卷帙如新師曰此書如何彙集上曰依沈約平上去入之韻以為編次如上平一東即一東字便有五十來卷師曰其中所載何事上曰天文地理山川人物凡有涉於東字者靡不畢載師曰常言祕閣奇書多有人間目未經見者道忞今日親聆皇上天語真聞所未聞矣上一日謂師曰少林堂頭涵宇也集有五燈續略將那付帕子底盡收入祖師圖西山者裏有箇達如亦是少林付帕僧也在五燈續略上若達如上得傳燈朕也上得師曰到是皇上上得達如上不得此僧嘗親近先師在道忞會下亦住過彼時不善用心曾著境魔了一年然五燈續略聞得皇上許他入藏是否上曰朕那時知得僧家甚麼長短後閱楞嚴始知有佛法道理知有宗門下事及老和尚諸善知識輩則皆憨璞之力故憨璞大有功于法門者也上又曰聞得報恩和尚十九歲便悟道得恁少年極是難得師曰少年悟道古來亦有如佛日禪師見夾山時年方十三機辯縱橫早已徹悟但如玉兄廿三五歲便出世為人乃奇特耳上曰慈壽玄水亦少年出世䒢溪進曰南方如玄水後生付法者甚多師曰後生付法不道全無如玄水敢在皇上面前敲鐘擂鼓陞座說法也是難得上曰果亦奇特聞他為老和尚修笑祖塔不知怎樣葺理師曰四圍築了百來丈石牆上曰裏面須做些房子好著人看守師曰他意亦欲起五間塔院尚未動工上曰笑嵒和尚塔在那一方師曰出西直門過了高浪橋北行一二里踞昌平大路上上曰此地朕常來往不知有笑祖塔師曰荒冢纍纍皇上何由得知上曰者番有便朕當親詣塔前瞻禮一回上一日語師朕再與人同睡不得凡臨睡時一切諸人俱命他出去了方睡得著若聞有一些氣息則通夕為之不寐矣師曰皇上夙世為僧蓋習氣不忘耳上曰朕想前身的確是僧今每常到寺見僧家明窗淨几輒低回不能去又言財寶妻孥人生最貪戀擺撲不下底朕于財寶固然不在意中即妻孥覺亦風雲聚散沒甚關情若非皇太后一人罣念便可隨老和尚出家去師曰剃髮染衣乃聲聞緣覺羊鹿等機大乘菩薩要且不然或示作天王人王神王及諸宰輔保持國土護衛生民不猒拖泥帶水行諸大悲大願之行如祇圖清淨無為自私自利任他塵劫修行也到不得諸佛田地即今皇上不現帝王身則此番召請耆年光揚法化誰行此事故出家修行願我皇萬勿萌此念頭上以為然上一日問師叢林日逐如何行持師為陳說一遍上曰朕觀老和尚上堂與報恩和尚不同何也師曰道忞舉行出自清規玉兄尤仍時套蓋一向沿習教家故耳上曰何謂清規師曰佛法初入東土一切僧家依律而住祇分上座大眾就如今時粥飯叢林相似無有堂頭統攝其間至大覺懷海禪師刱建百丈叢林乃準律儀參王制倣朝廷官府之儀以立方丈主法之人分知事頭首為東西兩序并諸內外雜職于是坐立有序動靜有規勒而成書總祝釐報本等事分為九章累朝奉敕刊行所謂百丈清規也上曰老和尚帶得有此書麼師曰帶有此書上曰可將來與朕待回宮細閱亦知得叢林規矩也師乃呈上上律身極節儉凡諸服御概從樸素一日語師曰朕衣裳非左右請澣則終歲不更舉秋羅中衣示師曰今日齋戒祭祀乃易此耳然褻服尤然紵葛數經澣濯者復指青袍與履曰出見群臣不好意思服此妝箇體面若在宮則布鞋布襪即此靴亦不穿也又舉腰間黃條曰此帶亦繫了五年師為熟視覺已破損乃歎曰我皇惜福雖大禹何加焉上一日為師敘述滿州風土地方雖小而山高壤沃可以樹藝五穀即果實亦佳所乏者布帛耳至于人參貂鼠則南方又少矣為言參苗在土固大小不偷必高出群卉之上故掘參者得以覘取然亦在人財喜有當面錯過而後來反見者凡入山須裏糧結伴以往或半月十日始回間有傷于虎狼斃于高嵒深澗亦艱虞事也往時有采參誤踐熊庭者夜昏不能出矣熊乃采果飼之天明得隊反引眾射殺其熊後來其人卒生惡疾而死又言西韃子則逐水艸而居五穀不生唯食禽獸肉故其人腥臊不可聞與朕東方大不同也復問師聞南方虎豹極小即大者僅類黃牛耳然朕北方豺狼俱大若虎則過如壯馬此復何故師曰亦風土使然也上一日攜王學士至方丈坐次師奏曰先師語錄皇上許為入藏莫要箇本麼上曰要箇本朕方可批部施行老和尚可有本麼師曰有上曰將出來師遂陳上上細覽一過仍入套中執持在手停刻適近侍奉茶至上乃遞與曰好生收著三日後上復至師奏曰昨日禮部有官來說先師語錄皇上已俞允入藏矣敬謝天恩上曰此亦小事師復奏曰今此間北藏皇上未經修理江寧有南藏乞皇上命禮部可移咨江寧先入流通上曰南藏收藏何處甚麼官員職掌師曰版藏大報恩寺明朝管屬禮部我朝不設此官或責在僧司也上命侍臣著北京僧錄司移咨江寧去上復謂師曰先和尚語錄還有麼師曰有上曰可存一部在文書館俟他日修北藏時可刊行師復進呈上一日早朝傳旨可將景山新鑄滲金大佛抬至萬善殿與老和尚隨喜巳牌舁到師瞻禮竟駕隨至問師適來佛相何如師曰真所謂希有世尊也道忞此生固然未見恐古亦罕有蓋從上帝王莊嚴象設何代無之不過捐發帑金命臣工監造而已爭似皇上親為指授所以精妙無比上曰此象經朕相度不知幾回已剝蠟將就爐矣朕忽下階回看覺頂相不正重命更改故三載始落成也師問滲金之法上曰先用皁礬水銀塗象後上金箔以火煆之金著礬汞即滲入銅內然必三五回上金方得通透無瑕師曰將來此象安奉何處上曰朕在南苑刱有新寺老和尚想未知道師曰忞亦微聞皇上為皇太后祝釐聖躬故建茲寺上曰要老和尚隨喜意下如何師曰皇上建殊勝功德賜忞瞻禮誠為萬幸不知何日可去上曰俟朕打疊停妥然後來請過數日上復至語師曰南苑有玄靈宮亦朕刱建左右碑文係閣臣金之俊與劉正宗所撰今新寺碑要老和尚撰文不命臣工也師曰道忞山林野逸那裏曉作朝廷文字以皇上高深使忞揆度得無井窺天蠡酌海哉上曰老和尚不要如此謙虛待請隨喜了便可屬筆師曰明日可去麼上曰朕今日齋戒明日祭祀夜來示牲五更行禮則通夕不寐矣回宮得寢息半日午後方出南苑至明日著人來請也時上已命御膳御茶兩衙門官就玄靈宮供辦以待至次晚上差包裏三大臣就萬善殿迎師四鼓發足平明抵玄靈宮包裏臣馳奏上問齋可辦得齊備未奏云已備上曰俟老和尚齋畢引至新寺前後隨喜了請老和尚回萬善殿是日也山殽海錯無物不備兩衙門遵旨于上行宮正席坐師餘諸門弟子則偏殿安排齋畢包裏臣如命導從奉師還宮越三日上至師曰昨承皇上威光得隨喜新寺已儼升忉利天宮又祇受盛燕顧何福消之上曰齋不麤率麼師曰魚麗所謂多而嘉旨而偕有而時固贊歎莫能及也第奉旨撰文媿不雅馴尚祈聖裁鑒定毋俾辱國乃出以進上為展閱一過命侍臣收入宮內次日上復攜王學士至方丈謂師曰朕昨回宮細看老和尚者篇文字極得大體風雅典則不待言矣師曰勉遵慈命如蚊負山幸不罪責乃蒙皇上褒嘉過甚也上曰朕固不通文字曾與王熙看過試問他何如王學士曰此千秋不朽之文也師曰忞實慚媿上又曰即書丹篆額還要借重老和尚師曰朝堂濟濟不乏虞歐褚柳之賓乃命順朱如忞者為之一發使馬牽犁矣上曰朕極喜老和尚書法字畫圜勁筆筆中鋒不落書家時套師曰如皇上不容固辭乞敕賜寺額得以綴文從事上制名德壽命文書館畫格授師師為擘窠書上上乃敕良工劉光陽摹勒上石焉上一日謂師曰老和尚苦欲還山朕亦不敢強留違老和尚意俟三二年萬姓瘡痍稍起朕思江南一行當親入天童看老和尚師曰皇上再不要動此念頭忞見兩院巡方便拿船起夫下程酒水百般支應里鄙遞年好不苦殺況復聖駕親臨者沿途百姓算來都是死數上搖手曰朕自然有箇道理決不遺累地方過數日上復為言師曰如聖駕必欲巡幸江南乞預先傳旨諭忞好在江上迎駕上曰朕動身時必先著人說與老和尚知道上一日語師老和尚許朕三十歲來為祝壽庶或可待報恩和尚來祝四十朕決候他不得矣師曰皇上當萬有千歲覆幬生民何出此言上彈頰曰老和尚相朕面孔略好看揣懷曰此骨已瘦如柴似此病軀如何挨得長久師曰皇上勞心太甚幸撥置諸緣以早睡安神為妙上曰朕若早睡則終宵反側愈覺不安必譙樓四鼓倦極而眠始得安枕耳師曰皇上心血不足可服參附諸藥餌麼上曰早晚常服天王補心丸師曰補心丸有地黃當歸恐與皇上脾氣不對上曰少時喜喫水精蒲桃致傷脾胃年來讀書耗氣復有歐血之病坐此正難調攝耳師曰乞皇上早為珍嗇天下臣民幸甚上曰謹依老和尚慈念上一日語師朕于宮中造有關夫子勒馬聽風之相身披黃金鎧甲純用五色寶石填廁其間所侍關平周倉亦如之今送老和尚還山留作天童護法師曰忞被殊恩又光泉石天童香火從此萬年不燼矣上曰朕已命人抬至老和尚可出共觀時相皆有黃幔遮塵上為揭示則周倉面朝裏壁上呼近侍李國柱可與朕抬正此相師前代上上曰老和尚恐難著力時師行者玄猷近前上復揮去乃躬自移正焉因問行者甚處人者曰玄猷承天府人上曰朕本朝已改承天為安陸州了者曰玄猷躡屩四方久已不聞故鄉消耗上曰也是真話上一日語師天岸隨老和尚出京還青州可分付他不要更赴別請當常住山東教化北方蓋過了黃河直抵京師無有禪門主導四眾極可悲閔得久久闡揚一番便都各知有此事師曰謹遵慈命上復語師老和尚還山朕要留門下弟子兩位在此早晚說話如見老和尚一般師曰道忞諸弟子都是箇愚戇底人恐有不到處得罪皇上反成道忞過咎上曰老和尚一旦還山教朕如何忍得朕亦不留他在宮供養本意要幾位有道眼底闡化京師上乃自定旅菴山曉二人命擇前門善果隆安二大剎俾住持開法焉上擇五月望旦差包裏臣劉之武送師還山上自淩晨躬候登程時師早餐未畢已傳聖駕將出矣師趨立門左上單騎卒至見師下馬師前慰上曰道忞還山願皇上定慮凝神保佑聖躬又月皙二子在京恐有不到乞皇上慈悲教育上曰都知道了老和尚不須罣念師曰即請皇上還宮上曰請老和尚上馬師率諸弟子就道上騎忽出師右諸人見駕來俱欲下馬上止曰你們騎馬不慣下了難上不要回互罷上與師並駕行將及一望師再三請上還宮上始回韁少間師已抵北苑門矣上騎復至促師馬首曰老和尚還山可著人看朕朕常著人看老和尚不要疏間了師曰恭奉慈命上乃與師握手而別
