body:
  text: 門人真樸編次住大內萬善殿語錄順治十六年十月十五日奉旨開堂結冬聖駕親臨特差內院官李世昌張嘉謨雷先聲執香迎師至座前師云兜率上升天王敷座不見道名稱如來聞十方諸吉祥中最無上昔曾處此摩尼殿是故此處最吉祥以手指云大眾看看百萬億欄楯階陛百萬億天繒妙寶百萬億香光雲網百萬億殊勝莊嚴一一皆由我皇積劫修行百萬億阿僧祇善根功德所共成就於一念間於此殿中一時顯現了也還見麼遂陞拈香此一瓣香不自天生非從人得一本諸佛菩薩大慈薰種大悲植根大喜大舍之所灌溉滋培大願大力之所暢茂條達然後斷之以金剛智斧析之以方便慧刀爇向爐中結而為蓋則覆被大千散而為雲則潤流沙界端為祝延今上皇帝聖躬萬歲萬歲萬萬歲伏願功超三后道貫百王舞干羽而格有苗八荒順化垂衣裳而朝萬國天下歸仁復拈云此一瓣香毘藍園裏收來無憂樹下將出爇向爐中奉為昭聖慈壽恭簡安懿章慶皇太后次及內宮皇后伏願壽同山固福與天齊濬發長祥克昌厥後上首白椎云法筵龍象眾當觀第一義師展拂云倒騎鐵馬入重城敕下傳聞六國清手握金鞭問歸客夜深誰共御街行還有同途合轍者麼不妨攜手上高臺問今日奉旨開堂當說何法師云金風吹玉管那箇是知音進云大中天子曾輕觸三度親遭弄爪牙此是後人頌黃檗為人處即今御駕親臨和尚作麼生相為師云香煙堆裏好生觀進云只如現前大眾那箇知恩師打云你須領取者一頓進云還有報恩者麼師云大家齊著力進云恁麼則華封三祝不獨唐堯師云速禮三拜著進云某甲亦得橫趨金殿過身惹御爐香便禮拜問飛錫一聲天地動爐煙起處遍乾坤為國開堂於此日未知將底答皇恩師云須彌有頂低垂日進云師將少室真消息祝讚當今有道君師云兜率無根下戴鼇進云但見皇風成一片不知何處有封疆師云不勞重說偈言進云琉璃殿長珊瑚樹瑪瑙階生碧玉華師云閒言語僧禮拜問靈山憶別已多年一會相逢尚儼然龍象駿奔咸鶴望請垂一語利人天師云八角磨盤空裏走進云一句迥然開祖胄千秋法運喜重新師云未盡贊揚進云但願舜日與佛日同輝慧天與堯天共朗師云不妨道著進云從此堯天光不夜真風普扇十洲春師云篷底月明歸載去劫前風韻落誰家僧喝師云皇帝面前何得下喝進云莫怪渠儂多意氣他家曾謁聖明君師以杖推下問遠頒睿旨留供闕庭特命開堂將何酬答師云惟憑一滴曹谿水遍界為霖報我皇進云萬方瞻此日九土沐洪恩師云大地山河齊點首同呼萬歲聖明君進云昔日趙州因燕趙二王至州據坐云上等人來禪床上接即今聖駕親臨和尚又如何施設師云適來拈香祝聖已竟進云如是則光揚大法全在斯時師云窣堵那吒掌上擎進云昔日靈山親晤後現登佛位示金輪師云且喜闍黎共證明問太白遙遙降紫泥高飛法錫到龍墀安禪大內親承供報答皇恩句倩誰師云金香爐下鐵崑崙進云過去五佛開三顯一不知顯那一義師便打進云即今棒喝交馳又顯何事師復打進云謝師指示師云你曾夢見也未進云慈風蕩蕩播今古遍界歌謠祝聖君師云學語之流一札千行乃云靈山密旨千聖同宣少室真宗萬靈共證其奈依稀越國者多彷彿揚州者眾正如入京朝聖主纔到潼關即便休所以不睹廣大門風焉知威德自在拈拄杖卓一下云若向者裏一蹋鴻門洞開兩扇則可謂腳跟不動身入帝鄉造託非他盡蹋御園春色欽承有自無違咫尺天顏諸仁者宣德門前且無曲徑含元殿上覓甚長安然則把定乾坤奚煩顧佇流通正眼端在茲辰何故欣逢聖主隆吾道千載難忘此一時復云制結皇家禪安大內地爐掘深深之炕獸炭燒燄燄之煤欽差內院三員正副監司兩位禁城把斷密不通風閶闔牢關水無滲渫如此嚴切為汝諸人諸人合作麼生即得若非皮骨通身換難報我皇護念恩白椎云諦觀法王法法王法如如是卓拄杖下座舉大覺昇長老旅菴月西堂立僧上堂問綸音既奉寶座隨陞祝聖伽陀驚聞舉唱大暢玄風即不問如何是向上一路師云駱駝尾上弔冬瓜進云向上一路千聖不傳雞足山中等箇甚麼師豎起拂子云專待流通此事來進云向上一路千聖不言多子塔前合談何事師便喝進云祇如今日和尚陞堂特為分座作麼生是為人一句師云問取座元天岸昇進云與麼則一滴曹源續遠流去也師云誰知正法眼滅卻瞎驢邊僧一喝師云好一喝僧拂袖歸眾乃云昔年北海曾分座今日攜登萬歲臺幸有任公竿在手不煩船子竹重栽衲僧巴鼻從施展佛祖牢關任打開接得滹沱嗣斷際鐵牛生下玉麟來復舉乾峰示眾云舉一不得舉二放過一著落在第二師云乾峰老子雖是握節當胸未免死守善道若是萬善舉一不妨舉二栴檀林內栴檀師子堀中師子一不放過二非落節萬里無雲萬里天千江有水千江月祇如雲門出眾云昨日有人從天台來卻往徑山去乾峰呼典座來日不得普請要且如何論量又作麼生諮參分付西堂月旅菴上堂問朔風颯颯卉木蕭蕭應時雪曲則不問雲門三句請師宣師云昨夜三更半石人鬥禮拜進云大千籠不住沙界絕遮欄如何是函蓋乾坤句師云恆進云聲色俱不到語默總無干如何是截斷眾流句師云弢進云有水皆含月無山不帶雲如何是隨波逐浪句師云曳進云更有一句請師拈出師便打進云恁麼則千山勢到嶽邊止萬派聲歸海上消師復打云收進云今日恰是某甲錯問師云犬吠虛聲切愚人望太陽問春冬易過四序如流龍華三會且休題佛在祇園事若何師卓拄杖云能為萬象主豈逐四時凋進云今朝和尚萬善陞堂又作麼生師云人天大眾共圍繞進云如何是肉眼師打云者無明塊頭如何是天眼師云仰面看取如何是慧眼師云辨得你了也如何是法眼師云鐵蛇鑽不入如何是佛眼師云摩醯首羅有三隻進云恁麼則白雲盡處是青山行人更在青山外師云甚處去也一僧出云請和尚手中棒喫師云且待三十年後著進云知音不用頻頻舉達者須知暗裏驚師云你因甚刺腦入膠盆乃云栴檀樓閣白牛車曉日光籠五色霞誰向東風歌一曲御園開遍牡丹華有般漢祇憑箇蓋色騎聲者句子道我千差坐斷萬別一途死獦狚地硬自差排為人舉覺誑他閭閻即得若欲出頭天外獨步大方法隨法行法幢隨處建立必須手眼通身高低普應遇川廣人與他說川廣底話遇閩浙人與他說閩浙底話遇江淮人與他說江淮底話遇長安人與他說長安底話方可謂之我為法王於法自在何故人居大國方為貴水到滄溟徹底清至節上堂拈香祝聖此一瓣香先為佛心天子次為國太摩耶伏願常居鳳闕永鎮龍樓覺了自心超步毘盧寶頂義成一切頓圓調御十身問祖印高提於五鳳樓前已見聲光浩浩門風遠播於千秋世外應知規步綿綿灰飛律管陽初復榜出僧堂意若何師云夜來天子拜南郊進云若人識得不離四威儀中現前大眾箇箇活潑潑地還收得此意麼師云朝打三千暮打八百進云前村深雪裏昨夜一枝開師云是什麼消息進云報道來年春更好師云羅睺羅兒與一文乃云夜來天子拜南郊雲物交章瑞氣饒林下慶逢何以祝千祥願共集今朝一願皇帝萬歲二願國母千春三願內宮皇后早生太子四願文武官僚高增祿位五願風調雨順國泰民安六願天下太平干戈永息有般禪和子便道山僧樁樁咒願只是為了朝廷一家於諸現前大眾豪無顧念之心阿呵呵若論現前大眾非但山僧直饒三世諸佛也無他著力分何故形山共有天真寶萬象光吞自本來佛祖尚然侵不得陰陽何事解相催傲殘臘雪衣千綴貯盡山雲缽一枚寵辱無驚神自王天宮地府任徘徊上堂問天上星同月人間河與山星月河山歸一統祇如王子未登殿時如何師云端拱深宮內王子正登殿時如何師云諸國盡來朝王子登殿後如何師云天下太平萬民樂業進云恁麼則自從一箭收功後萬載千秋帝業隆師云不是闍黎分上事問普天匝地祥雲起靉靆繽紛瑞氣騰瑞氣騰空則且置如何是萬善境師云華雨晝飄龍座暖天風時送御爐香如何是境中人師云芒鞋蹋上黃金闕竹杖敲開帝里門僧擬進語師云何不問人中意進云前問已蒙師指示向上還有事也無師云你且向下會取如何是向上事師云剎竿頭上風車子進云恁麼則天共白雲曉水和明月流師云站過者邊著進云竹密不妨流水過山高豈礙白雲飛師云念話杜家問作麼與和尚相見即得不犯於鋒芒師云禮拜了退僧作禮云犯師便打問向上一路即不問千聖不傳事若何師擊拂云驀進云恁麼則金風吹玉管那箇是知音師云引不著進云他家自有通霄路不向他人行處行師云亂走作麼僧一喝師便打乃云諸佛無有法佛於何有說但隨其自心謂說如是法灼然是真語者實語者如語者不異語者敢問大眾祇如三腳驢子弄蹄行我在青州做領布衫重七斤扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾如是之說且道是自心所謂耶不是自心所謂耶道是則謗心道非又謗經畢竟如何即得河裏失錢河裏摝參上堂問達磨西來一字無全憑心地用工夫既然心地用工夫如何過去心不可得師云昨日小盡二十九如何現在心又不可得師云今朝臘月剛初一如何未來心不可得師云過後五日向你道進云三心既不可得老和尚又教大眾參箇甚麼師云教你向三心不可得處參進云恁麼則久旱逢甘雨他鄉遇故知師云依然乾燥燥地在問擿大千於方外納須彌於芥中龍象交參即不問五家宗旨請師通師云逐一問將來棒下翻身去風光遍界騰如何是臨濟宗師云金剛杵打鐵山摧星移斗轉乾坤黑稍有絲豪實不存如何是雲門宗師云五鳳樓前舞纛旂將謂少林消息斷桃華依舊笑春風如何是曹洞宗師云問取三宜和尚去兩口無一舌此是吾宗旨如何是溈仰宗師云紅線兩條穿海嶽三界唯心萬法唯識如何是法眼宗師云零秋風動萬家砧進云五家宗旨蒙師指示末後一句請師速道師便喝進云再請一喝師打云你尚未知落處在僧禮拜歸位問君王有道干戈息四海人民賀太平如何是君師云當今皇帝萬萬歲如何是臣師云鵷鷺班聯拱玉宸如何是君視臣師云蓋之如天容之如地如何是臣向君師云歸仰如日就如雲如何是君臣道合師云元首明哉股肱良哉進云五位君臣蒙師指再求一句報君恩師云國王長壽天下太平問理事無礙體用全彰體用全彰則不問如何是理法界師云九德陶鎔空有象如何是事法界師云五色光先入紫宸如何是理事無礙法界師云佛殿走出山門外僧堂撞入廚庫裏如何是事事無礙法界師舉起拂子復放下云與你熟商量進云恁麼則天上有星皆拱北盤內無鍼不指南師云是什麼道理僧禮拜云家家有路透長安師云轉使楊朱泣路隅乃舉馬王請石門蘊和尚住夾山鑾駕出接便問如何是西來大道蘊云御駕六龍千古秀玉街排仗出金門神鼎諲禪師拈云一等是祇對人王大哥三昧寬廓何也與麼祇對又不負西來大意又善能回互其中理事樅然有問神鼎如何是西來大道對云行且道與古人是同是別師云若據山僧看來一人有身而無用一人有用而無身有用無身者理上偏枯有身無用者事上不足若是山僧又且不然有問如何是西來大道但云等閒蹋著來時路好道堂堂信步歸大眾堂堂好道即且止如何是來時路卓拄杖云宮眷法從人等至此下車馬成道上堂問曠大劫來成佛久雪山又道悟明星敢問此理如何師云今日方知本現成進云道離言說和尚今朝上堂且道說箇甚麼師云塵剎共宣無間歇進云大哉聖人千古一轍師云怎麼見得進云天上無雙月人間只一僧師云且莫塗汙山僧好問雪山夜半睹明星正覺今朝道始成如何是正覺山前事師云秋壟此時驅健犢進云如何是出世因緣事師云道山何日跨歸鸞進云今朝事作麼生師云看腳下進云千江有水千江月萬里無雲萬里天師云虧你念得熟問昨夜睹明星今朝佛成道如何又說未出母胎度人已畢師云近北始知黃葉落進云吾師應召遊京國萬善陞堂事若何師云向南空見白雲多進云皇恩普覆三千界法雨周流萬國中師云只你猶欠水艸僧一喝師云一任𨁝跳乃舉起拂子云大眾見麼若也見得徹去可謂心同虛空界示等虛空法證得虛空時無是無非法其或未然拂子不免打葛藤謾你諸人去也復舉起云即此是如來智慧德相即此是正法眼藏涅槃妙心即此是實相無相微妙法門是故靈山以此而末後拈華飲光以此而破顏微笑西天東土歷代祖師以此而直指人心見性成佛天下老和尚以此而建大法幢宣大法要山僧以此而開鑿人天續佛慧命諸人以此而晝夜六門放大光明大眾既是同彼同此同見同聞因甚釋迦悟去諸人不悟擿下拂子云只為分明極反令所得遲上堂一僧纔出師約住云三臺應合大家催敲唱還須妙辨才埽卻葛藤陳舊案生機一路問將來如何是生機一路僧喝師便打僧擬議師喝下又一僧出師云夸父但追紅日走陳摶偏占白雲眠你為甚刺腦入膠盆僧擬議師喝下又一僧出師云西風蓬島仙鄉遠夜雪藍關客路長你蹋破多少艸鞋到者裏僧擬議師又喝下乃云諸人總被葛藤絆倒幸值皇帝在上不可冷了壇場山僧不免令拄杖雲興普慧之問更令拂子缾潟普賢之酬作一場佛事看敕拄杖出班問話移拄杖向前云來也來也問我觀仁者廉纖不少因甚諸方付法必將仁者傳持答指揮如意天華落收放同時妙體彰如何是妙體彰底事答動容揚古路不墮悄然機適蒙和尚教問話唯願仁者不吝慈悲答如上人者恐難酬對世出世間何者為尊何者為貴答人中天子法中王如何是人中天子答四海皆臣妾萬方拱紫宸如何是法中王答常以法財施一切人王法王相去多少答日月兩輪交互炤人王尊耶法王尊耶答若在人王人王中尊若在法王法王中尊人王見法王時如何答帝青倒影浮春殿法王見人王時如何答太白流光入夜池人王法王相見合談何事答入到桃源舊遊處一層峰鎖一層峰昔日梁武帝初見達磨便問如何是聖諦第一義磨云廓然無聖意旨如何答炤膽寒光沉碧漢帝云對朕者誰磨云不識又作麼生答潑天滄海浸須彌叢林盡道達磨不諳時機故遭武帝攙出未知是否答掀翻海嶽求知己為報時流莫浪猜爭奈獨自凄凄暗渡江答少室巖前金鳳舞卻憐嫩桂影婆娑今日皇上設問仁者如何是聖諦第一義合作麼生致對答首出庶物萬國咸寧對朕者誰又且如何答萬歲臺前焉敢造次如斯祇對還契他聖意也無答應知天鑑自高垂恁麼則九年冷坐無人識內苑今開五葉華答來年更有新條在漏渫春光卒未休為是生人福業為是法運當興答吾道欣逢真聖主風雲嘉會際昌期祇如諸方知識合作麼生報答即得不辜皇恩答閒把一枝無孔笛為君吹出太平歌善哉仁者機能活千古傳持信有由答堊斲鼻端非匠石運斤爭顯郢人高輕輕躡足龍門過惹得清風動地生答須知遠煙浪別有好商量遠煙浪且置願聞好商量答任從滄海變終不為君通可謂昔日普賢今朝仁者答休將鶴唳誤作鶯啼乃喝一喝云不是山僧喝住看者兩箇漢打葛藤有甚了期所以雪竇明覺和尚云一問一答總未有事在假饒盡大地乾坤艸木叢林盡為衲僧異口同音各致百千問難不消老僧彈指一下便乃高低普應前後無差大愚芝和尚云翠巖即不然盡乾坤大地微塵化為衲僧各致一問問問各別但向伊道你許多衲僧皮下還有血麼今日山僧又復不然盡空法界無邊國土俱抹為塵盡此塵點衲僧各致百千問難總與劈脊便棒若知棒頭落處管取恆沙疑義一時瓦解冰消大眾莫道山僧扶他拄杖子好擿拄杖下座除夕小參休去歇去冷湫湫去滴水滴凍去純清絕點去一念萬年去寒灰枯木去古廟香爐去一條白練去長安城裏臘月三十日到來去前九句即不問諸人後一句你道如何千門掩斷金貂客萬事收歸大道杯說到此間亭子裏韋天聞得驀地出來道長老長老你從南遠來安禪大內不見你爐頭熱鬧逼得幾箇生蛇化龍倒說與麼扯長冷話幾時得他心眼廓徹去山僧被伊搔著癢處不覺謾成山偈一首老我憨憨坐釣磯金鉤不曲巨鼇稀相看賴有海門月鐵笛邀同舴艋歸他道長老你一發獃了臘月三十夜那裏討得月來乃喝一喝云你自被箇須彌山子遮卻眼睛無端錯怪他人作麼復舉玄沙出嶺因築破腳指大悟回見雪峰峰曰子何不遍參去沙曰達磨不來東土二祖不往西天後來梁山觀悟道又有頌曰參道喜明無說句通玄不是意中猜超今異古終難況幸感西胡特地來且作麼生和會好還知麼玄沙據虎頭梁山收虎尾你道中間底復屬阿誰來年更有新條在惱亂春風卒未休元旦上堂拈香祝聖此一瓣香金為枝玉為葉天同蓋地同擎爇向爐中端為祝延今上聖躬萬歲萬歲萬萬歲伏願得一居貞函三御極蘿圖鞏固等劫石而彌堅寶曆常新空芥城而不盡更祈聖母皇太后次及內宮皇后德思齊而思媚男斯百而斯千如盛至之川流多受福祉類升恆之日月萬有千春乃云一二三風卷蟭螟過海南三二一上下四維無等匹地天得一故清寧一得我皇天下式唯有衲僧得處奇衲僧得一天難測驪龍頷下抉明珠猛虎頭邊揮玉尺佛祖看成鹿夢蕉浮幢視等蟬委翼手攜席帽出長安頭戴華巾離少室一箇閒人天地間清風匝地有何極上元日上堂問十五日已前欲借一問得麼師云但向十五日已前問將來進云五九盡日又逢春時如何師云清風來未已進云十五日已後請師答話師云明月炤重城進云冬到寒食一百五學人恁麼道和尚又作麼生師云許你與麼道進云正當十五日又如何話會師云千燈光炤夜萬樹火燒空進云欲得祖風不墜委在明眼宗師瑯琊五種禪病更冀法檀點破師云我者裏一病也無點破箇甚麼進云又道不得向萬里無寸艸處去師云放下腳來看進云二不得孤峰獨宿時如何師云隨緣觀自在進云三不得張弓架箭時如何師云且喜天下太平進云四不得物外安身時如何師云觸處任方圜進云五不得滯於生殺又作麼生判斷師喝一喝云是生是殺進云一處有滯自救難為五處若通方名導師只如諸方說法還有不滯一處者麼師云上座曾到諸方也未進云畢竟將什麼接物利生師豎拂云將者箇僧一喝師云臨濟兒孫猶在進云非但此眾洞開心目直使諸方打翻藥爐去也師云坐斷十方何處出氣僧禮拜師乃云心月孤圜光吞萬象心燈晃耀萬古長今所以燈不自炤炤必因心月不自明明以心顯叵怪寒山子吾心似秋月碧潭空皎潔又怪漳州權吾心似燈籠著火內外紅斯皆不達境唯心起種種分別之說也老萬善莫別有長處麼吾心非月亦非燈攪不渾兮止不澄曠大劫來無別異輝天鑑地自光騰解冬上堂問答不錄乃云去年十月十五日開爐諸人在裏許山僧不在裏許今歲正月廿五百日期完諸人不在裏許山僧卻在裏許何故山僧以十世古今為旦暮無邊剎海為禪床真如實際為尼師壇十方三世諸佛菩薩為鄰對單盡空法界聲聞緣覺為麤糲行童含靈抱識一切有情之類為公案話頭於中行亦禪坐亦禪語默動靜體安然然則正當今日卻要禮辭闕庭復歸林下又作麼生金蕊銀絲承玉露高僧不坐鳳凰臺復舉丹霞淳示眾乾坤之內宇宙之間中有一寶秘在形山肇法師恁麼道祇解指蹤話跡且不能拈示於人丹霞今日劈開宇宙打破形山為諸人拈出具眼者辨取遂以拄杖卓一下云還見麼鷺鷥立雪非同色明月蘆華不似他師云丹霞雖然與麼拈出也則是明珠暗投豈免按劍相顧爭似山僧今日擿下拄杖云海神知貴不知價留與人間光炤夜上因師還山駕幸萬善殿話別仍傳旨請師上堂問安居大內密不通風得旨還南光生泉石把住即不問如何是放行一句師云七通八達進云恁麼則一月印千江去來無朕跡師云一任縱橫進云既沾新雨露擺手出長安師云只許你一半問百尺竿頭進步千尋崖底翻身絕後再甦底人如何行履師云五鳳樓前聽玉漏須彌頂上擊金鐘進云與麼則遇緣即宗隨處建立去也師云新羅天子𨁝跳上梵天僧便喝師亦喝進云厲風不鳴條驟雨不破塊坐享無為底人如何受用師云八方齊入貢萬國盡來朝進云十萬江山稱佛國百千香火祝堯天師云不妨被闍黎道著進云皇情特重馳驛還山報恩一句請師速道師云無計上酬天子德心香一炷滿山樓進云握手臨岐如何話會師云車如流水馬如龍進云可謂風力扶帆行不櫂笛聲邀月下滄州師云四海浪平龍睡穩九天雲淨鶴飛高進云祇如五千里外作麼生與紫宸相見師云春寒秋熱不間一絲進云野色更無山隔斷天光直與水相通師云私事不得官酬乃云長安門外有一人樞機竭盡入作無從者過在望上心高不自知有故也長安門裏復有一人玄辨徒呈出身無路者過在鳳縈金網莫克翀霄故也諸仁者苟能上無攀仰下絕己躬道奧深臻玄關不住縱步威音王劫外踢翻鸚鵡月洲前則出為毘盧之師入作法身之主又何須借路還家自然回途得妙然後法隨法行法幢隨處建立更有何過正當恁麼時如何四海五湖皇化裏杖頭八面起清風卓拄杖下座
