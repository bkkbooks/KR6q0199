body:
  text: 門人真朴編次奏對別記上上一日同師坐次侍臣抱書一束約十餘本置上前上因語師曰此朕讀過底書請老和尚看看師細簡一遍皆左莊騷先秦兩漢唐宋八大家以及元明撰著無不畢備至末一本有二百篇制藝則洪武開科以來鄉會程文師曰此八股頭文字皇上讀他何用上曰老和尚顧不知那朕要覆試進士文章如大成孫承恩徐元文三科狀元皆朕親自擢取的是敝門生也師曰狀元本稱天子門生今又出自陛下房中則是親上加親矣上為大笑上一日語師朕極不幸五歲時先太宗早已晏駕皇太后生朕一身又極嬌養無人教訓坐此失學年至十四九王薨方始親政閲諸臣奏章茫然不解由是發憤讀書每晨牌至午理軍國大事外即讀至晚然頑心尚在多不能記逮五更起讀天宇空明始能背誦師曰如五百言一篇文字皇上要幾遍可背上曰六七遍亦強記得來然半月十日即忘殺矣朕書皆誦至五十遍如經四則已背溫七次計前後諸書讀了九年曾經歐血從老和尚來後始不苦讀今唯廣覽而已師曰帝王之學貴在正心誠意明倫察物正不必如經生家區區呫嗶為也上曰朕觀前代帝王如唐之太宗亦少年雅能武戡亂文經邦今朕年齒不少徒置身臣民之上是以不敢自懷安佚耳師曰陛下虛懷好學如此將來不難軼湯駕禹恐文皇未足當我皇也上又曰朕向來讀底書多虧了曹化淳為時常習他語音遂成了夸話老和尚可曉得夸麼師曰道忞聞得到了山東北京都叫做夸子上曰北京城裏又叫做奤子曹化淳是裏八府人故名夸也師曰忞實不知上亟稱狀元徐元文年少而才高學博朕親試天將以天子為木鐸之文蓮華荷葉蕅之對及孚齊說瀛臺賦莫不妙有奇思師曰此鳳鳴岡河出圖之瑞也易稱聖人作而萬物睹有我皇聖人在上故元文出而瑞世耳上曰御河之南有臺明稱南臺朕今改之所謂瀛臺也宮城之北有山明稱煤山朕今改之所謂景山也煤山即崇禎帝投繯之所語畢潸然復歔欷歎息曰崇禎帝亦英主惜乎有君而無臣不幸為李闖窘迫畢命于此殊為可恨然明制過于文法太嚴下情上閼睽隔不通未免有壅蔽之患耳我朝則不拘大小臣工一概寬之文法從容召對使常陛見既才略可以盡知且因以覘其人之詐與誠忠與佞也師曰我皇御下可謂唯聖人為能通天下之情明庭反是固及于亡即先帝亦口舌喜怒進退臣工殊乏知人之鑑上曰知人則哲自古為難者也怪他不得第崇禎帝極聰明卻不信有佛法將宮中纍葉所崇事象設命人使麻繩鐵索拖曳而出其媟瀆神明如此若我朝于三寶決不敢少有輕忽也師曰國家尊崇象教使忞與天下緇侶得安泉石真殫躬莫報皇恩矣上一日言及新進士當朕考選翰林時有剃去髭髯假充年少以希入選者不數日髭鬚仍出則面如墨塗有嘲之以西湖詩曰刪即刪兮留不留鬚鬍抱怨幾時休冷風吹得通身戰卻把常州作滿州此翰林蓋毗陵籍也師曰進士周漁係廣陵人滿面髭鬚不剃而亦選得翰林何也上笑曰如周漁之髭鬚方可稱將謂鬍鬚赤更有赤鬚鬍者矣第朕于翰林不過就其才品高雅者選之豈有偏比其間偶有一二少年選入彼遂以此迎合朕意耳老和尚相周漁豈不才品高雅者師曰誠如聖諭上曰老和尚何從識周漁師曰忞居昭陽時曾及門問道蓋親近牧雲弟之門人完白者為既久故其人亦頗有見處上遂使學士以孔顏樂處問漁漁答云滿座春風又以向上一事千聖不傳為問答云我者裏用者閒家具不著上大喜特召至孚齊賜坐與茶命作孚齊說為刊布中外焉上出狩昌平回為言明之諸陵規模弘敝工費浩繁當日用金非數百萬不可其中龍神結聚堂局周正唯長陵最佳可惜朕去遲了數百年合抱蒼松翠柏砍伐幾盡朕已特下嚴旨仍加護植矣但崇禎帝陵寢湫隘不堪合朕自捐金修葺奈國用匱乏思諭明臣共襄厥事師曰伐陵斷脈古今通弊以元世祖之仁明不能忘情于宋世六陵乃皇上不唯覆護之反加崇飾焉此至仁至聖之美政真足為萬世有天下者師法也上一日問師老和尚幾年上住天童師曰道忞于崇禎十六年癸未春住持天童初意只展三年廬墓之思四衆勉請開法至順治三年心器畢將有他山之行為魯國主起義越州江于阻塞是秋明師潰大兵渡江時寧波新任知府韋忞適忘其名矣上曰韋克振也其子韋成賢亦上科翰林今補江寧督糧道去了師曰因韋知府請忞齊始得謝事詣郡庭屬以費隱容兄使請繼席焉上曰老和尚門下亦有宰官嗣法者麼師曰只有舉人張立廉亦崑山世家子幼掇科名一上公車即杜門學道垂二十年矣與上科進士葉有恆為中表弟兄也上曰崑山進士只有葉方恆其弟方藹現登探華及第蓋老和尚錯記為葉有恆耳師曰慚愧皇上日應萬幾于疏逖新進之臣尚然簡在帝心乃忞老昏健忘如此揆諸天聰豈不雲泥相隔哉上一日與師評論古今名臣宿將摘瑕指瑜纖悉無遺師因問上草一想經御覽多矣上曰間嘗寓目百不記一若資治通鑑則朝夕在案不時展觀也師曰宋臣李綱明臣劉大夏精忠練達誠如聖鑒然宋明兩代享國靈長多由大臣輔弼之力如趙普之逢君張居正之攬權姑置不論至若韓琦之調停兩宮梁儲之迎立世廟不可謂非精忠練達者上曰老和尚許二臣精忠練達所謂其智可及也朕許二臣精忠練達所謂其愚不可及也即老和尚罪居正攬權是矣彼時主少國疑使居正不朝綱獨握則道傍築室誰秉其成亦未可以攬權罪居正也師曰聖智淵深誠非凡見可測矣上一日問先老和尚及師語録雜著師合并進呈上逐部翻揭至師語録問山翁莫是老和尚別號麼師曰不敢又問老和尚原號木陳此何意義師曰本婺州山名趙州門下有從朗禪師者住此忞景慕趙州高風竊比門弟子為私淑諸人耳上曰文集名布水臺何也師曰廬山有瀑布遊人題詠最多李青蓮所謂銀河倒挂三石梁者是也旁有峰筍削與瀑齊上平如砥可坐十數人故名布水臺瀑之上為黃嵒寺蒙山道明歸宗智常咸居于此忞出家開先住靜黃嵒文集因遂託其名上復展閲見其中有薦嚴毅宗烈皇帝疏上曰毅宗莫不是崇禎帝麼師曰然上曰本朝諡思宗非毅宗也師曰忞僻遠疏虞聞江南諡如此而不知本朝有別諡也上曰此亦何妨復披簡見禪燈世譜上曰此書老和尚集得極好便于查考展閲至終復語師曰幻有傳和尚下因甚不載雪大師師曰本有名字在磬山前即先師豎龍池碑亦載于法嗣之列而雪師自謂上嗣雲門肆罵先師乃始刊去其名上曰後來因甚又拈龍池香師曰先師入塔時雪師以弔慰至天童見叢林之盛禪衆之多深為感慨因書扇頭送忞同參唯一潤者潤數其侍者曰大師老矣今天童圓逝座下英靈如我唯一者奚啻萬千何不住箇院子總與收拾門下終日作詩寫字成得甚麼邊事大師聞之笑曰唯一到也說得是老僧便去討箇院子住只是你們不要哄我潤曰哄即不哄但要大師撥轉船頭拈龍池香乃頭正尾正若遠扳雲門我輩決不肯做那無尾巴底猢猻大師曰是是老僧出山就上龍池掃塔撥轉船頭去自後住東塔雲門遂拈龍池香焉上笑曰雪大師到底心如赤子不謾訶風罵雨顛了一生上一日問師漢月在先和尚付法弟子中是第幾位師曰五峰學兄下即漢月藏兄也上曰聞得後來先老和尚復有書闢其謬妄是否師曰語載總直說中誠有此事上曰果爾則見地全乖先和尚當日何必付他師曰漢月藏兄未見先師時已匡徒領衆所以先師在廬山即見其語録曾謂侍僧曰此人聰明不亞博山第語缺師承在緣藏兄負性堅剛兼之造道英鋭在學地中本有悟處但才高意廣未免師心自用喜于鑿空見奇故其失也流為支離怪誕如判六祖本來無一物為墮空落外者是也上曰先老和尚何不教訓他師曰先師亦幾次移書規誡藏兄反往往于提唱語中雌黃先師故先師發明從上綱宗徵其謬妄乃有數萬言闢書與前後三録之說䒢溪進曰即磬山先老人亦為藏公有復問萬餘言現在行森袱中上命笻溪持來時青州大覺在坐上曰天岸可為朕朗誦一遍至中間上不覺勃然變色誦畢上曰此真法門跋扈之夫也因述笑談有嘲人妄自尊大者云一村學究每言開天闢地以來祇有五箇聖人或問為誰村學究數曰盤古伏羲周公孔子或曰第五位聖人又是那箇村學究笑而不答或曰莫不是老先生麼村學究拱手曰不敢便是者般樣人衆皆大笑上一日語師昨在宮看先和尚語録見總直說中有辨天三說道理固極于透頂透底更無餘地可臻矣即文字亦排山倒海遮障不得使人讀之胸次豁然雲披月現朕向亦有意與他辨折一番今見先和尚此書雖聖人復起不易斯言故已命閣臣馮銓及詞臣製序將謀剞劂宣示中外使天下愚民不為左道所惑師曰皇上此舉功流萬世奚啻出民水火之中顧先師大義微言何幸折衷我皇聖人哉上遂問師天主教書老和尚曾看過麼師曰崇禎末年廣閩盛行其說有同參唯一潤者從福建回持有此書因而獲睹上曰湯若望曾將進御朕亦備知其詳意天下古今荒唐悠謬之說無踰此書何緣惑世反從其教真不可解師曰此含生之所以出沒三途如遊園觀蓋邪見為之糾纏也上一日問師聞具德為一粗行僧痛打一頓真有此事否師曰有之上曰者僧何處人見甚麼道理敢打善知識師曰聞是河南固始人科頭赤腳到處叢林行杜多苦行便以己方人見知識過如為神農之言者責滕君厲民自養底意思故非但靈隱即報恩和尚亦思痛下一番毒手因伺候兩月不得其便乃止上曰老和尚曾著他手麼師云道忞在維揚曾來會下住了數日幸而得免想叨皇上威靈故耳上為大笑上一日問師明季狀元楊廷鑑老和尚可曾與他相會麼師曰道忞昔年過毗陵叨承供養上曰他與我朝狀元呂宮為兩聯襟一箇人家生兩女嫁了兩箇狀元亦是人間希有之事今廷鑑子又入翰林年甚少而才學亦高師曰三十年來江南科第之盛獨數毗陵至兩壻皆狀元恐古今罕有也上一日持一韻本示師曰此詞曲家所用之韻與沈約詩韻大不相同師為展閲一過上曰北京說話獨遺入聲韻蓋凡遇入聲字眼皆翻作平上去聲耳於是上親以喉脣齒舌鼻之音調為平上去入之韻與師聽之又言西廂亦有南北調之不同老和尚可曾看過麼師曰少年曾翻閲至於南北西廂忞實未辦也上曰老和尚看此詞何如師曰風情韻致皆從男女居室上體貼出來故非諸詞所逮也師乃問上紅拂記曾經御覽否上曰紅拂詞妙而道白不佳師曰何如上曰不合用四六詞反覺頭巾氣使人聽之生趣索然矣師曰敬服聖論上曰蘇州有箇金若寀老和尚可知其人麼師曰聞有箇金聖歎未知是否上曰正是其人他曾批評得有西廂水滸傳議論儘有遐思未免太生穿鑿想是才高而見僻者師曰與明朝李贄所謂卓吾子者同一派頭耳上一日語師朕前者因海氛之警將親統六師屆于南徐會江寧捷至中止若果南行當親入天童見老和尚不須法錫遠來也師曰父召無諾君命召不俟駕而行以皇上君父之命臨忞草莽之臣敢憚修途第慚愚拙無由克副宸衷耳上曰鄭成功真箇起義興復明朝此亦好事朕豈怪他緣順治初年曾經投順今復入海楊波則是在清在明均為叛賊此朕所以饒他不得師曰聞渠父芝龍在京不知存沒何如上曰收禁在城亦是沒帳算底人就教他下海濟得甚事打死不如放生故著人好好養活他一生罷了師合掌曰我皇真天覆地載之量也上一日語師適才為雲南獻俘朕特臨軒召問蓋明朝國公姓桑名某者本義王孫可望將領投了李定國故義王失勢歸順我朝頃定國敗逃此人落竄民間為遊徼偵獲并妻孥七八口杻械至京朕熟視其人亦是箇漢及詳細問他則慷慨陳詞殊無悚戁之意乃命解其束縛與他散官一員俾隨朕駕師曰此人有一千箇死字在項賴我皇起白骨而肉之然復宜何縻軀而報聖恩也上曰天下之大似此等輩奚啻萬千必欲依罪議刑將不勝其誅戮矣太上以好生為德只當買雀放生也好師曰皇上深仁厚澤如此豈直令他反側子自安從此窮荒絶漠盡入版章矣上一日早朝後見師曰今晨有官赴巡撫任辭朝者其人才略儘好朕慮他過用其才因面諭之你才足辦此方事但隨力隨分任運做去便了若更加豪末其間則生事害民非國家與你之福也師曰大哉王言昔曹參治齊用此道也人謂其善黃老術不知即三代牧民之法也忞見處處地方清靜寧一後遂不靜寧者皆官更擾之耳我皇此訓足垂萬世上一日問師曹洞下近來有甚麼人師曰儘有說法主導一方者如雲門下辨山之子百愚曾繼道忞住大能仁寺可稱善說法要座下常有數百衆即學問行解亦色色俱佳上曰何處人名甚麼師曰名淨斯河南人又石雨和尚亦雲門下有天愚遠門輩一般好門人上曰聞三宜亦曹洞宗師曰百愚輩即其姪也上曰聞他常講經既稱宗師當提持向上事講經卻不相宜師曰始于雲門湛和尚以堠卒出家信得此事鋭于參禪雖浩然打徹卻一丁不識因親依雲棲始得宗說俱通後來出世念學者根器不同庶幾多方淘汰可以廣利群品故禪餘亦為講說三和尚初依瓶陶聞谷大師業通經論洎參湛師開悟後廣歷南北宗教後出住顯聖亦間為學者談經此雲門家法也上曰有箇覺浪亦是曹洞宗聞其善作文字是否師曰浪和尚又出壽昌之後下筆千言思如涌泉但稍缺精練耳至若持論超邁皆發前人之所未發如哀公問社章往多說壞宰我他卻別生議論謂孔子與宰我同一鼻孔出氣總為有國有家者垂一鑒戒見得一箇天下數百年之內倏爾為夏倏爾為殷倏爾為周金甌易缺寶曆難長使人惴惴焉不勝天命靡常之懼上曰下文卻難消釋師曰他說孔子底話正是雪上加霜之意謂夏后殷周者還是成遂既往底事不必理論他了只是後來底人當思祈天永命不要蹈他覆轍此意須於言外見之上曰卻違了朱注師曰他正謂朱子強解所以翻案見奇上曰我朝制舉凡中式文字要遵朱注蓋文運與國運相關自天啓年來倍叛經傳好尚子書創為一種荒唐悠謬之說互相染習由是乖僻中于人心國隨以亡今朕深懲此蔽力還正始不拘鄉會小考文字過五百言試官參罰諸士退革師曰皇上如斯維士風即是培國脈天下將還淳返朴再見熙和之象矣上一日命近侍李國柱持一黃篋傳旨命師起字師恭議覺王義成二字進之上旋命中使宣傳諭師曰此乃諸佛洪名朕何人敢當此字願老和尚勿以天子視朕當如門弟子旅菴相待可也師乃更議慧橐山臆字面進之上以慧橐自名山臆作字刻玉為章用之書畫焉嗣後復命師起號欲以菴字為準師議穆菴亹菴簡菴幻菴十二號進呈上用幻菴二字又命師起堂名師議得師蕘復著說以進由是上益擊節嘉歎以為極謙卑又極尊光卻移在他處不得蓋非有天下者不可擅用也上一日語師經生家唐器一世光陰只為得幾篇腐爛時文于己躬下性命二字全不留心殊可閔傷朕于鄉會兩場必命出理學題目也教他思索一番與他種箇因也得師曰此皇上佛菩薩度盡衆生心也然性命關頭須當人信得己躬下有恁般大事方可留心若只向文字上理會任他千般思萬般索只打向得名場流轉今皇上但縣一格有人悟得祖師禪定與他今科狀元自然箇箇留心上曰老和尚說得極是上一日語師韓愈是唐朝最不信有佛法底人故其原道一篇語多支離卻有李翱一箇好門生于性命之學反極通透師曰他曾經藥山點化過來故贈藥山有鍊得身形似鶴形千株松下兩函經我來問道無餘事雲在青天水在瓶之偈上曰李翱有復性四篇老和尚曾看過麼師曰忞向未見上命侍臣李國柱取其書來與師同誦既畢師曰宋杭州佛日寺有禪師名契嵩者曾著輔教編及傳法正宗記以萬言書達御覽仁宗為歎賞中宵錫以明教禪師之號忞常疑其文字高古卻非先秦兩漢之體而不知其祖述李翱也然翱之通透性學真難逃聖鑒矣上一日問師在俗名姓師曰道忞俗姓林名蒞上曰昆仲可有幾人師曰祇有胞兄一人上曰甚麼名字師曰兄名涵字元孺上曰與老和尚別來幾載不相見矣師曰去歲五月兄涵攜姪輩數人來天童看道忞適赴召上京只住得一箇月上曰子姪兄弟亦有在仕途者麼師曰堂姪于達僅以歲貢現作本省羅定州教官上曰聞得廣東比北方人尤不信向三寶老和尚少年因甚出家師曰道忞因見目連傳痛念生死遂發心修行䒢溪進曰老和尚未棄俗時敝省最鄙薄僧家以為遊手好閒極不堪齒録底人近三十年來則世家公子舉監生員亦多有出家者浙直素稱佛地覺似不如廣東矣上曰老和尚乘願而來引導此方固非偶然也師曰時節因緣如此忞何與焉上復曰老和尚法諱不襲龍池派何也師曰道忞在先師門下未曾更名尤仍受業師派上曰受業派如何師曰受業先師出家維揚法名上智下明派從西山戒壇分去底有二十四字所謂佛法能仁智慧本來自性圓明者是也然道忞不從慧而從道者緣受業先師住廬山開先寺時又演為佛道興隆有開必先傳燈紹祖以永萬年一十六字今忞以開先屬了別家復演為二十八字曰道本玄成佛祖先明於杲日麗中天靈源廣潤慈風溥照世真燈萬古縣道字宗開先本字溯戒壇以志不忘水木根源之意耳上曰老和尚可將此派寫與朕師即寫呈上命侍臣收藏宮內
